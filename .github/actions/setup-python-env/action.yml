name: "Setup Python Environment"
description: "Set up Python environment for the given Python version"

inputs:
  python-version:
    description: "Python version to use"
    required: true
    default: "3.12"
  mkdocs-packages:
    description: "Packages to install for docs deployment"
    required: true
    default: "mkdocs mkdocs-material"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install MkDocs tooling
      run: pip install --upgrade pip ${{ inputs.mkdocs-packages }}
      shell: bash
